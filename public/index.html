<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nulls Community</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Профиль -->
        <div id="profileContainer" class="profile-section">
            <div class="banner" id="banner"></div>
            <div class="avatar-container">
                <img id="avatar" class="avatar" src="">
                <div class="edit-avatar" onclick="editAvatar()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"></path>
                        <polygon points="18 2 22 6 12 16 8 16 8 12 18 2"></polygon>
                    </svg>
                </div>
            </div>
            <h2 id="username"></h2>
            <p id="description" class="description"></p>
            <div id="links" class="links"></div>
            <button class="edit-profile-btn" onclick="editProfile()">Редактировать профиль</button>
        </div>

        <!-- Навигация -->
        <div class="nav">
            <button class="nav-btn" data-page="profile">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Профиль</span>
            </button>
            <button class="nav-btn" data-page="teams">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Команды</span>
            </button>
            <button class="nav-btn" data-page="regular-matches">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9h12M6 15h12"></path>
                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                </svg>
                <span>Матчи 2x2</span>
            </button>
            <button class="nav-btn" data-page="tournament-matches">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v4M8 4l4 2 4-2"></path>
                    <path d="M8 12h8"></path>
                    <path d="M12 8v12"></path>
                    <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                </svg>
                <span>Турниры</span>
            </button>
            <button class="nav-btn" data-page="tournaments">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v4M8 4l4 2 4-2"></path>
                    <path d="M8 12h8"></path>
                    <path d="M12 8v12"></path>
                    <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                </svg>
                <span>Список турниров</span>
            </button>
        </div>

        <!-- Контент -->
        <div id="content" class="content"></div>
    </div>

    <script src="/app.js"></script>
</body>
                        </html>
