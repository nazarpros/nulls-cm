<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nulls Community</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Профиль -->
        <div class="profile-section" id="profileSection">
            <div class="banner" id="banner"></div>
            <div class="avatar-container">
                <img id="avatar" class="avatar" src="">
                <div class="edit-avatar" onclick="editAvatar()">✏️</div>
            </div>
            <h2 id="username"></h2>
            <p id="description" class="description"></p>
            <div id="links" class="links"></div>
            <button class="edit-profile-btn" onclick="editProfile()">Редактировать профиль</button>
        </div>

        <!-- Навигация -->
        <div class="nav">
            <button class="nav-btn" onclick="showPage('profile')">👤 Профиль</button>
            <button class="nav-btn" onclick="showPage('teams')">👥 Команды</button>
            <button class="nav-btn" onclick="showPage('matches')">⚔️ Матчи</button>
            <button class="nav-btn" onclick="showPage('tournaments')">🏆 Турниры</button>
        </div>

        <!-- Контент -->
        <div id="content" class="content"></div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
